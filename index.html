<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head> 
<body>
    <header>
        <h1>GRADE CALCULATOR</h1>
    </header>

    <main>

        <h2>GPA</h2>
        <section id="gpaContainer">
            
        </section>

        <h2>SUBJECTS</h2>
        <section id="subjectsContainer">
            
        </section>

        <section id="inputSection">
            <input type="text" id="subjectName" placeholder="Subject Name">
            <input type="number" id="oralInput" placeholder="Oral grade">
            <input type="number" id="testInput" placeholder="Test grade">
            <input type="number" id="projectInput" placeholder="Project grade">
        </section>

        <button id="addSubjectBtn">+ ADD SUBJECT</button>

        
        <h2>FILTER</h2>
        <section id="filterSection">
            
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
